<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiển thị sản phẩm - API với JS thuần + Bootstrap 5.3</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (tùy chọn, làm đẹp icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .product-img {
            height: 200px;
            object-fit: contain;
            padding: 10px;
            background-color: #f8f9fa;
        }
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #d63384;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }
        .error-message {
            color: #dc3545;
            text-align: center;
            padding: 2rem;
        }
        .product-title {
            font-size: 1rem;
            font-weight: 600;
            height: 48px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container py-4">
        <!-- Header -->
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">
                <i class="fas fa-store me-2"></i>Danh sách sản phẩm
            </h1>
            <p class="lead">Dữ liệu được lấy từ API FakeStore</p>
        </div>

        <!-- Hiển thị loading, lỗi hoặc nội dung -->
        <div id="productContainer">
            <div class="loading">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Đang tải...</span>
                </div>
                <span class="ms-3">Đang tải sản phẩm...</span>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (tùy chọn cho một số component nhưng không bắt buộc) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Khai báo API URL (dùng FakeStore API miễn phí)
        const API_URL = 'https://fakestoreapi.com/products';
        
        // Hàm fetch dữ liệu sản phẩm
        async function fetchProducts() {
            const container = document.getElementById('productContainer');
            
            // Hiển thị trạng thái loading
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Đang tải...</span>
                    </div>
                    <span class="ms-3">Đang tải sản phẩm...</span>
                </div>
            `;
            
            try {
                // Gọi API bằng fetch (JS thuần)
                const response = await fetch(API_URL);
                
                // Kiểm tra nếu response không ok (404, 500,...)
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                
                // Parse JSON
                const products = await response.json();
                
                // Kiểm tra nếu không có sản phẩm
                if (!products || products.length === 0) {
                    renderEmptyState();
                } else {
                    renderProducts(products);
                }
                
            } catch (error) {
                console.error('Lỗi khi gọi API:', error);
                renderError('Không thể tải dữ liệu sản phẩm. Vui lòng kiểm tra kết nối mạng hoặc thử lại sau.');
            }
        }
        
        // Hàm hiển thị danh sách sản phẩm (dùng Bootstrap grid)
        function renderProducts(products) {
            const container = document.getElementById('productContainer');
            
            // Sử dụng Bootstrap row + col
            let productsHTML = `
                <div class="row g-4">
            `;
            
            // Lặp qua từng sản phẩm
            products.forEach(product => {
                // Format giá tiền (USD)
                const formattedPrice = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(product.price);
                
                // Giới hạn mô tả ngắn
                const shortDescription = product.description.length > 100 
                    ? product.description.substring(0, 100) + '...' 
                    : product.description;
                
                productsHTML += `
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                        <div class="card h-100 shadow-sm border-0">
                            <img src="${product.image}" class="card-img-top product-img" alt="${product.title}" loading="lazy">
                            <div class="card-body d-flex flex-column">
                                <h5 class="product-title card-title" title="${product.title.replace(/"/g, '&quot;')}">
                                    ${escapeHtml(product.title)}
                                </h5>
                                <p class="card-text text-muted small">${escapeHtml(shortDescription)}</p>
                                <div class="mt-auto">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="price">${formattedPrice}</span>
                                        <span class="badge bg-secondary">${product.category}</span>
                                    </div>
                                    <button class="btn btn-sm btn-outline-primary w-100 mt-3 view-detail" 
                                            data-id="${product.id}"
                                            data-title="${escapeHtml(product.title)}"
                                            data-price="${product.price}"
                                            data-description="${escapeHtml(product.description)}"
                                            data-image="${product.image}">
                                        <i class="fas fa-info-circle me-1"></i> Xem chi tiết
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            productsHTML += `</div>`;
            container.innerHTML = productsHTML;
            
            // Thêm sự kiện cho các nút "Xem chi tiết" (sử dụng event delegation)
            attachDetailEvents();
        }
        
        // Hàm xử lý sự kiện cho các nút chi tiết (dùng delegation)
        function attachDetailEvents() {
            const container = document.getElementById('productContainer');
            
            // Dùng event delegation để bắt sự kiện click trên các nút có class 'view-detail'
            container.addEventListener('click', (event) => {
                const button = event.target.closest('.view-detail');
                if (button) {
                    const id = button.getAttribute('data-id');
                    const title = button.getAttribute('data-title');
                    const price = parseFloat(button.getAttribute('data-price'));
                    const description = button.getAttribute('data-description');
                    const image = button.getAttribute('data-image');
                    
                    // Hiển thị modal chi tiết (tạo modal tạm thời bằng Bootstrap)
                    showDetailModal(id, title, price, description, image);
                }
            });
        }
        
        // Hàm tạo Bootstrap modal hiển thị chi tiết sản phẩm
        function showDetailModal(id, title, price, description, image) {
            // Format lại giá tiền
            const formattedPrice = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(price);
            
            // Tạo modal HTML
            const modalHTML = `
                <div class="modal fade" id="productDetailModal" tabindex="-1" aria-labelledby="productDetailModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header bg-primary text-white">
                                <h5 class="modal-title" id="productDetailModalLabel">
                                    <i class="fas fa-box me-2"></i>Chi tiết sản phẩm
                                </h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="text-center mb-3">
                                    <img src="${image}" alt="${title}" style="max-height: 200px; object-fit: contain;" class="img-fluid">
                                </div>
                                <h4>${title}</h4>
                                <p class="text-muted">Mã sản phẩm: #${id}</p>
                                <div class="alert alert-light border">
                                    <strong>Mô tả:</strong> ${description}
                                </div>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <span class="price fs-3">${formattedPrice}</span>
                                    <button class="btn btn-success" disabled><i class="fas fa-shopping-cart"></i> Mua ngay (Demo)</button>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Kiểm tra nếu modal đã tồn tại thì xóa đi để tránh trùng
            const existingModal = document.getElementById('productDetailModal');
            if (existingModal) {
                existingModal.remove();
            }
            
            // Thêm modal vào body
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            
            // Khởi tạo và hiển thị modal bằng Bootstrap JS
            const modalElement = document.getElementById('productDetailModal');
            const modal = new bootstrap.Modal(modalElement);
            modal.show();
            
            // Khi modal đóng, xóa khỏi DOM để dọn dẹp
            modalElement.addEventListener('hidden.bs.modal', function () {
                modalElement.remove();
            });
        }
        
        // Hàm hiển thị thông báo khi không có sản phẩm
        function renderEmptyState() {
            const container = document.getElementById('productContainer');
            container.innerHTML = `
                <div class="alert alert-warning text-center" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    Không có sản phẩm nào để hiển thị.
                </div>
            `;
        }
        
        // Hàm hiển thị lỗi
        function renderError(message) {
            const container = document.getElementById('productContainer');
            container.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle fa-3x mb-3"></i>
                    <h3>Đã xảy ra lỗi</h3>
                    <p>${escapeHtml(message)}</p>
                    <button id="retryBtn" class="btn btn-danger mt-2">
                        <i class="fas fa-redo me-1"></i> Thử lại
                    </button>
                </div>
            `;

        }
        
        // Hàm bảo vệ tránh XSS (escape HTML)
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Hàm khởi tạo, gắn sự kiện refresh và gọi API lần đầu
        function init() {
            fetchProducts();
        }
        
        // Bắt đầu khi trang tải xong
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
