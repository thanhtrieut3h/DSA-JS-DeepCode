<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-sm-12 col-md-6 offset-md-3">
                <h2 class="my-3 text-center">Todo Lists</h2>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="Nhap ten cong viec" id="taskInput">
                    <button class="btn btn-info" id="addBtn">
                        <i class="bi bi-clipboard2-plus"></i>
                    </button>
                </div>
                <ul class="list-group" id="taskList">
                </ul>
                <p class="form-text mt-3">Còn lại: <span id="remainingCount">0</span> công việc</p>
            </div>
        </div>
    </div>

    <script>
        // Lấy các phần tử DOM
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const remainingCountSpan = document.getElementById('remainingCount');

        // Mảng lưu trữ danh sách công việc
        let tasks = [];

        // Hàm cập nhật số lượng công việc chưa hoàn thành
        function updateRemainingCount() {
            const remainingTasks = tasks.filter(task => !task.completed).length;
            remainingCountSpan.textContent = remainingTasks;
        }

        // Hàm hiển thị danh sách công việc
        function renderTasks() {
            taskList.innerHTML = '';
            
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.classList.add("list-group-item");
                
                // Tạo span chứa tên công việc
                const taskSpan = document.createElement('span');
                taskSpan.textContent = task.name;
                taskSpan.className = 'task-item';
                if (task.completed) {
                    taskSpan.classList.add('text-decoration-line-through');
                }
                
                // Sự kiện click vào tên công việc để đánh dấu hoàn thành
                taskSpan.addEventListener('click', () => {
                    tasks[index].completed = !tasks[index].completed;
                    renderTasks(); // Render lại toàn bộ
                });
                
                // Tạo nút xóa
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '<i class="bi bi-trash"></i>';
                deleteBtn.className = 'btn btn-danger btn-sm float-end';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); // Ngăn sự kiện lan ra span
                    tasks.splice(index, 1);
                    renderTasks();
                });
                
                li.appendChild(taskSpan);
                li.appendChild(deleteBtn);
                taskList.appendChild(li);
            });
            
            updateRemainingCount();
        }

        // Hàm thêm công việc mới
        function addTask() {
            const taskName = taskInput.value.trim();
            if (taskName === '') {
                alert('Vui lòng nhập tên công việc!');
                return;
            }
            
            tasks.push({
                name: taskName,
                completed: false
            });
            
            taskInput.value = '';
            renderTasks();
        }

        // Sự kiện click nút Thêm
        addBtn.addEventListener('click', addTask);
        
        // Sự kiện nhấn phím Enter trong ô input
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });
        
        // Khởi tạo danh sách mẫu
        tasks = [
            { name: 'Học JavaScript', completed: false },
            { name: 'Làm bài tập DOM', completed: false },
            { name: 'Đọc sách', completed: true }
        ];
        renderTasks();
    </script>
</body>
</html>
