<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search - TMDb API</title>
    <!-- Bootstrap 5.3 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons (optional, để đẹp hơn) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .movie-card {
            transition: transform 0.2s;
            height: 100%;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .movie-poster {
            height: 350px;
            object-fit: cover;
            border-top-left-radius: calc(0.375rem - 1px);
            border-top-right-radius: calc(0.375rem - 1px);
        }
        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0,0,0,0.7);
            color: #ffc107;
            padding: 5px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .card-text {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        footer {
            margin-top: 50px;
            padding: 20px 0;
            background-color: #e9ecef;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container py-4">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">🎬 Movie Search</h1>
            <p class="lead">Tìm kiếm phim từ The Movie Database (TMDb)</p>
        </header>

        <!-- Thanh tìm kiếm -->
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 col-lg-6">
                <div class="input-group input-group-lg">
                    <input type="text" id="searchInput" class="form-control" placeholder="Nhập tên phim... (VD: badman, avenger, titanic)" aria-label="Tên phim">
                    <button id="searchBtn" class="btn btn-primary" type="button">
                        <i class="fas fa-search"></i> Tìm kiếm
                    </button>
                </div>
                <div class="form-text text-muted mt-2">
                    <i class="fas fa-info-circle"></i> Dữ liệu từ TMDb API - Kết quả mẫu cho "Iron man" được hiển thị sẵn.
                </div>
            </div>
        </div>

        <!-- Khu vực hiển thị kết quả -->
        <div id="resultsArea">
            <!-- Loading spinner (ẩn mặc định) -->
            <div id="loadingSpinner" class="text-center d-none">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Đang tìm kiếm phim...</p>
            </div>

            <!-- Thông báo lỗi / không có kết quả -->
            <div id="errorAlert" class="alert alert-warning d-none" role="alert"></div>

            <!-- Grid hiển thị danh sách phim -->
            <div id="movieGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
        </div>
    </div>

    <footer>
        <p class="mb-0">Dữ liệu được cung cấp bởi <a href="https://www.themoviedb.org/" target="_blank">TMDb</a> &copy; 2025</p>
        <small>Dùng cho mục đích học tập và demo API</small>
    </footer>

    <!-- Bootstrap JS Bundle (có Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // API Key và base URL (bạn có thể thay bằng key của mình nếu muốn, nhưng key có sẵn vẫn hoạt động)
        const API_KEY = 'cfe422613b250f702980a3bbf9e90716';
        const BASE_URL = 'https://api.themoviedb.org/3/search/movie';
        const IMG_BASE = 'https://image.tmdb.org/t/p/w500';  // kích thước poster 500px

        // DOM elements
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const movieGrid = document.getElementById('movieGrid');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorAlert = document.getElementById('errorAlert');

        // Hàm hiển thị thông báo lỗi
        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.classList.remove('d-none');
            setTimeout(() => {
                errorAlert.classList.add('d-none');
            }, 4000);
        }

        // Hàm hiển thị danh sách phim lên grid
        function displayMovies(movies) {
            movieGrid.innerHTML = '';  // Xóa nội dung cũ
            
            if (!movies || movies.length === 0) {
                movieGrid.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-film fa-3x text-muted mb-3"></i>
                        <h4>Không tìm thấy phim nào</h4>
                        <p class="text-muted">Hãy thử từ khóa khác nhé!</p>
                    </div>
                `;
                return;
            }

            // Duyệt từng phim và tạo card Bootstrap
            movies.forEach(movie => {
                // Xử lý năm phát hành (lấy 4 số đầu nếu có)
                let year = '';
                if (movie.release_date) {
                    year = new Date(movie.release_date).getFullYear();
                } else {
                    year = 'N/A';
                }
                
                // Xử lý poster: nếu không có thì dùng ảnh placeholder
                const posterPath = movie.poster_path 
                    ? `${IMG_BASE}${movie.poster_path}` 
                    : 'https://via.placeholder.com/500x750?text=No+Poster';
                
                // Đánh giá (vote_average) làm tròn 1 chữ số thập phân
                const voteAvg = movie.vote_average ? movie.vote_average.toFixed(1) : '0';
                
                // Tạo card
                const col = document.createElement('div');
                col.className = 'col';
                col.innerHTML = `
                    <div class="card movie-card h-100 shadow-sm">
                        <div style="position: relative;">
                            <img src="${posterPath}" class="card-img-top movie-poster" alt="${movie.title}">
                            <span class="rating-badge"><i class="fas fa-star"></i> ${voteAvg}</span>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title fw-bold">${movie.title} <span class="text-muted fs-6">(${year})</span></h5>
                            <p class="card-text text-muted small">${movie.overview || 'Chưa có mô tả cho phim này.'}</p>
                            <div class="mt-auto">
                                <button class="btn btn-sm btn-outline-primary view-more-btn" data-id="${movie.id}">
                                    <i class="fas fa-info-circle"></i> Chi tiết
                                </button>
                                <span class="badge bg-secondary ms-2">${movie.original_language?.toUpperCase() || '??'}</span>
                            </div>
                        </div>
                    </div>
                `;
                movieGrid.appendChild(col);
            });

            // Thêm sự kiện cho các nút "Chi tiết" (có thể mở modal thông tin thêm - tùy chọn)
            document.querySelectorAll('.view-more-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const movieId = btn.getAttribute('data-id');
                    alert(`Chức năng xem chi tiết phim ID: ${movieId} sẽ được mở rộng sau.\nBạn có thể gọi thêm API /movie/{movie_id} để lấy thông tin đầy đủ.`);
                });
            });
        }

        // Hàm gọi API tìm kiếm phim
        async function searchMovies(query) {
            if (!query.trim()) {
                showError('Vui lòng nhập tên phim cần tìm!');
                return;
            }

            // Hiển thị loading, ẩn grid cũ và ẩn error
            loadingSpinner.classList.remove('d-none');
            movieGrid.innerHTML = '';
            errorAlert.classList.add('d-none');

            try {
                // Gọi API với query và api_key
                const url = `${BASE_URL}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=vi-VN&page=1`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                // data.results là mảng các phim
                const movies = data.results || [];
                
                // Hiển thị kết quả
                displayMovies(movies);
                
                // Nếu có tổng số kết quả, có thể log ra console
                console.log(`Tìm thấy ${data.total_results} phim cho từ khóa "${query}"`);
                
            } catch (error) {
                console.error('Lỗi khi gọi API:', error);
                showError('Đã xảy ra lỗi khi tìm kiếm. Vui lòng thử lại sau!');
                movieGrid.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                        <h4>Lỗi kết nối API</h4>
                        <p class="text-muted">Kiểm tra kết nối mạng hoặc thử lại.</p>
                    </div>
                `;
            } finally {
                loadingSpinner.classList.add('d-none');
            }
        }

        // Hàm tải phim mặc định khi trang vừa load (từ khóa "badman" giống API mẫu)
        async function loadDefaultMovies() {
            // Mặc định tìm "badman" để hiển thị demo (giống link API mẫu)
            // Nhưng để chủ động, ta gọi searchMovies với 'badman'
            // Nhưng tránh gọi lại nhiều lần, ta có thể set giá trị ô input thành 'badman'
            searchInput.value = 'Iron man';
            await searchMovies('Iron man');
        }

        // Sự kiện click nút tìm kiếm
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            searchMovies(query);
        });

        // Sự kiện nhấn Enter trong ô input
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                searchMovies(query);
            }
        });

        // Khi trang load xong, hiển thị danh sách phim mặc định (badman)
        window.addEventListener('DOMContentLoaded', loadDefaultMovies);
    </script>
</body>
</html>
